# 開発用 docker compose。`cp .env.example .env` 後に `docker compose up` で起動する。
# postgres / backend / frontend の3サービスを立ち上げ、frontend はホットリロード、
# /api は backend へプロキシする。本番用構成は Phase 7 で別途用意する。

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # ホスト側ポートは .env で変更可能（ローカルに別 PostgreSQL がある場合の衝突回避）
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # backend が接続する前に PostgreSQL の受付開始を待たせるための死活監視
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: ["./gradlew", "bootRun"]
    environment:
      # コンテナ間はサービス名 postgres:5432 で接続（ホスト側ポート変更の影響を受けない）
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - backend-gradle-cache:/root/.gradle
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: ["npm", "run", "dev", "--", "--host"]
    environment:
      # Docker の bind mount 上で HMR を確実に効かせるため polling を有効化
      VITE_USE_POLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # ホストの node_modules で上書きされないよう、コンテナ側を名前なしボリュームで保持
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres-data:
  backend-gradle-cache:
